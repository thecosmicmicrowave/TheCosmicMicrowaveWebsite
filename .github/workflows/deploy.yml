name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # Previously actions/checkout@v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: true

      - name: Setup Hugo
        # Previously peaceiris/actions-hugo@v3
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78
        with:
          hugo-version: '0.163.3'
          extended: true

      - name: Build Hugo Site
        run: hugo --gc --minify

      - name: Deploy to Cloudflare Pages
        # Previously cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy public --name="thecosmicmicrowavewebsite"
