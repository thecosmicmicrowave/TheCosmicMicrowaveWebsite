<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Title }} | FTC 35817</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ===== FULL CSS (same as index.html) ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a14;
            --bg-secondary: #111128;
            --bg-card: rgba(20, 20, 50, 0.7);
            --text-primary: #f0f0ff;
            --text-secondary: #b8b8e0;
            --accent-1: #7b4cff;
            --accent-2: #ff3b30;
            --accent-3: #ff6b6b;
            --glow-1: rgba(123, 76, 255, 0.3);
            --glow-2: rgba(255, 59, 48, 0.2);
            --radius: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }
        a {
            color: var(--accent-2);
            text-decoration: none;
            transition: var(--transition);
        }
        a:hover { color: var(--accent-1); }

        /* ----- STARFIELD ----- */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration, 4s) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255,255,255,0.3);
            animation: shoot linear infinite;
        }
        @keyframes shoot {
            0% { transform: translate(0,0) rotate(-35deg); opacity: 0; }
            5% { opacity: 1; }
            20% { opacity: 1; }
            100% { transform: translate(-400px,400px) rotate(-35deg); opacity: 0; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        /* ----- HEADER (same as index) ----- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 16px 0;
            background: rgba(10,10,20,0.8);
            backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid rgba(123,76,255,0.15);
            transition: var(--transition);
        }
        header.scrolled {
            background: rgba(10,10,20,0.95);
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-wrapper img {
            height: 48px;
            width: auto;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            padding: 4px;
            border: 1px solid rgba(123,76,255,0.2);
            transition: var(--transition);
            object-fit: contain;
        }
        .logo-wrapper img:hover {
            border-color: var(--accent-2);
            box-shadow: 0 0 30px var(--glow-2);
        }
        .logo-text {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
            letter-spacing: 1px;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
            list-style: none;
        }
        .nav-links a {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            position: relative;
            letter-spacing: 0.5px;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            transition: var(--transition);
        }
        .nav-links a:hover { color: var(--text-primary); }
        .nav-links a:hover::after { width: 100%; }
        .nav-cta {
            background: linear-gradient(135deg, var(--accent-1), #b30000);
            color: #fff !important;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
        }
        .nav-cta::after { display: none !important; }
        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--glow-2);
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
        }
        .hamburger span {
            display: block;
            width: 28px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: var(--transition);
        }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

        /* ----- HERO subpage (reduced) ----- */
        .hero-sub {
            padding: 120px 0 40px;
            background: var(--bg-primary);
        }
        .hero-sub h1 {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            margin-bottom: 0.25rem;
        }
        .hero-sub .date {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* ----- CONTENT ----- */
        .post-content {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 40px;
            border: 1px solid rgba(255,59,48,0.08);
            backdrop-filter: blur(4px);
            margin-bottom: 40px;
        }
        .post-content p {
            color: var(--text-secondary);
            margin-bottom: 1.2rem;
            font-size: 1.05rem;
            line-height: 1.8;
        }
        .post-content h2, .post-content h3 {
            font-family: 'Orbitron', monospace;
            color: var(--text-primary);
            margin: 1.5rem 0 0.5rem;
        }
        .post-content ul, .post-content ol {
            color: var(--text-secondary);
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }
        .post-content li { margin-bottom: 0.3rem; }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            background: transparent;
            color: var(--text-primary) !important;
            border: 1px solid rgba(255,255,255,0.15);
            transition: var(--transition);
        }
        .back-link:hover {
            border-color: var(--accent-2);
            background: rgba(255,59,48,0.08);
            transform: translateY(-2px);
        }

        /* ----- FOOTER (same) ----- */
        footer {
            background: var(--bg-primary);
            border-top: 1px solid rgba(255,59,48,0.06);
            padding: 40px 0 28px;
            margin-top: 40px;
        }
        .footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .footer-inner p { color: var(--text-secondary); font-size: 0.9rem; }
        .footer-inner .footer-logo {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1rem;
        }
        .footer-inner .footer-logo span { color: var(--accent-1); }
        .footer-links {
            display: flex;
            gap: 24px;
        }
        .footer-links a {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .footer-links a:hover { color: var(--accent-2); }

        /* ----- RESPONSIVE (minimal for blog) ----- */
        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 280px;
                height: 100vh;
                background: var(--bg-secondary);
                flex-direction: column;
                justify-content: center;
                padding: 40px 32px;
                gap: 24px;
                transition: var(--transition);
                border-left: 1px solid rgba(123,76,255,0.1);
                backdrop-filter: blur(20px);
            }
            .nav-links.open { right: 0; }
            .hamburger { display: flex; }
            .logo-text { font-size: 0.85rem; }
            .hero-sub h1 { font-size: 1.8rem; }
            .post-content { padding: 24px; }
        }
        @media (max-width: 480px) {
            .container { padding: 0 16px; }
            .logo-text { display: none; }
        }
    </style>
</head>
<body>

    <!-- ===== STARFIELD ===== -->
    <div id="stars" aria-hidden="true"></div>

    <!-- ===== HEADER ===== -->
    <header id="header">
        <div class="container nav-inner">
            <a href="/" class="logo-wrapper">
                <img src="/Screenshot_2026-06-19_at_10.31.06_AM-removebg-preview.png" alt="The Cosmic Microwave logo" />
                <span class="logo-text">The Cosmic Microwave</span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="/#about">About</a></li>
                <li><a href="/#team">Team</a></li>
                <li><a href="/#blog">News</a></li>
                <li><a href="/#contact">Contact</a></li>
                <li><a href="/#contact" class="nav-cta">Join Us</a></li>
            </ul>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <!-- ===== BLOG POST CONTENT ===== -->
    <section class="hero-sub">
        <div class="container">
            <h1>{{ .Title }}</h1>
            <p class="date"><i class="far fa-calendar-alt" style="margin-right:6px;"></i> {{ .Date.Format "January 2, 2006" }}</p>
        </div>
    </section>

    <section>
        <div class="container">
            <div class="post-content">
                {{ .Content }}
            </div>
            <a href="/#blog" class="back-link"><i class="fas fa-arrow-left"></i> Back to News</a>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer>
        <div class="container footer-inner">
            <div>
                <span class="footer-logo">The Cosmic Microwave · <span>FTC 35817</span></span>
                <p style="margin-top:4px;font-size:0.8rem;">&copy; 2026 The Cosmic Microwave. All rights reserved.</p>
            </div>
            <div class="footer-links">
                <a href="/">Home</a>
                <a href="/#about">About</a>
                <a href="/#team">Team</a>
                <a href="/#blog">News</a>
                <a href="/#contact">Contact</a>
            </div>
        </div>
    </footer>

    <!-- ===== SCRIPTS ===== -->
    <script>
        // Hamburger Toggle
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('open');
        });
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('open');
            });
        });

        // Header scroll effect
        const header = document.getElementById('header');
        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 50) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });

        // Starfield generator
        (function generateStars() {
            const starsContainer = document.getElementById('stars');
            const count = 200;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2.5 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 5 + 3) + 's');
                star.style.animationDelay = (Math.random() * 6) + 's';
                star.style.opacity = Math.random() * 0.6 + 0.2;
                starsContainer.appendChild(star);
            }
            for (let i = 0; i < 3; i++) {
                const ss = document.createElement('div');
                ss.className = 'shooting-star';
                ss.style.left = (Math.random() * 70 + 10) + '%';
                ss.style.top = (Math.random() * 30 + 5) + '%';
                ss.style.animationDuration = (Math.random() * 6 + 4) + 's';
                ss.style.animationDelay = (Math.random() * 20 + 5) + 's';
                starsContainer.appendChild(ss);
            }
        })();
    </script>
</body>
</html>
