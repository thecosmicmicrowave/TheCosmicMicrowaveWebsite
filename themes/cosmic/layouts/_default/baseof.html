<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <!-- Instructions: place logo.png in the /static/images/ folder -->
            <img src="/images/logo.png" alt="Cosmic Microwave Logo" class="logo" onerror="this.style.display='none'">
            <div>
                <h1>{{ .Site.Title }}</h1>
                <p class="motto">"Cogitare est coquere"</p>
            </div>
        </div>
        <nav>
            <a href="/">Home</a>
            <a href="/about/">About Us</a>
        </nav>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <p>&copy; {{ now.Year }} FTC Team #35817 Cosmic Microwave</p>
    </footer>
</body>
</html>
